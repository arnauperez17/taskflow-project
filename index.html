<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 flex items-center justify-center min-h-screen">

<div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg w-96">

  <h1 class="text-2xl font-bold text-center mb-6 text-gray-800 dark:text-white">
    TaskFlow
  </h1>

  <!-- BOTON MODO OSCURO -->
  <div class="flex justify-end mb-4">
    <button id="toggleDark" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:scale-105 transition">
      🌙
    </button>
  </div>

  <!-- INPUT TAREA -->
  <div class="flex gap-2 mb-4">
    <input 
      id="taskInput"
      type="text"
      placeholder="Nueva tarea..."
      class="flex-1 border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
    >

    <button 
      id="addTask"
      class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition"
    >
      Añadir
    </button>
  </div>

  <!-- BUSCADOR -->
  <input 
    id="search"
    type="text"
    placeholder="Buscar tarea..."
    class="w-full border p-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"
  >

  <!-- LISTA -->
  <ul id="taskList" class="space-y-2"></ul>

</div>

<script src="app.js"></script>

</body>
</html>
