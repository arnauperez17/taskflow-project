<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">

    <header class="topbar">
      <h1>TaskFlow</h1>
      <p>Organiza tus tareas fácilmente</p>
    </header>

    <div class="layout">

      <aside class="sidebar">
        <h3>Filtros</h3>
        <button class="filter active">Todas</button>
        <button class="filter">Trabajo</button>
        <button class="filter">Casa</button>
        <button class="filter">Personal</button>
      </aside>

      <main class="main-content">

        <form class="task-creator">

          <input 
            type="text" 
            placeholder="Escribe una tarea..."
          >

          <select name="priority">
            <option value="alta">Alta</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>

          
          <select name="category">
            <option value="Trabajo">Trabajo</option>
            <option value="Casa">Casa</option>
            <option value="Personal">Personal</option>
          </select>

          <button type="submit">Añadir</button>

        </form>

        <!-- LISTA DE TAREAS -->
        <section class="task-list">
          <!-- Aquí se insertan las tareas dinámicamente -->
        </section>

      </main>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
