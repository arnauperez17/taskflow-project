<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskflow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">

    <header class="topbar">
      <h1>Taskflow</h1>
    </header>

    <div class="layout">

      <aside class="sidebar">
        <h3>Filtros</h3>
        <button class="filter active">Todas</button>
        <button class="filter">Trabajo</button>
        <button class="filter">Casa</button>
        <button class="filter">Personal</button>
      </aside>

      <main class="main-content">

        <form class="task-creator">
          <input type="text" placeholder="Escribe una tarea...">
          
          <select>
            <option value="alta">Alta</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>

          <button type="submit">Crear</button>
        </form>

        <input type="text" class="search-input" placeholder="Buscar tarea...">

        <section class="task-list">
          <!-- tareas dinámicas -->
        </section>

      </main>

    </div>

  </div>

<script src="app.js"></script>

</body>
</html>
