<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>TaskFlow</h1>
  </header>

  <main>

    <aside>
      <h2>Categorías</h2>
      <ul>
        <li>Trabajo</li>
        <li>Estudio</li>
        <li>Personal</li>
      </ul>
    </aside>

    <section class="tasks">

      <div class="task">
        <div class="task-info">
          <h3>Estudiar JavaScript</h3>
          <p>Estudio</p>
        </div>
        <span class="badge high">Alta</span>
      </div>

      <div class="task">
        <div class="task-info">
          <h3>Hacer la compra</h3>
          <p>Personal</p>
        </div>
        <span class="badge medium">Media</span>
      </div>

      <div class="task">
        <div class="task-info">
          <h3>Enviar proyecto</h3>
          <p>Trabajo</p>
        </div>
        <span class="badge low">Baja</span>
      </div>

    </section>

  </main>

</body>
</html>
